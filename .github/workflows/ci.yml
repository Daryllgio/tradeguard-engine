name: TradeGuard Engine CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ python3 python3-pip nodejs npm

      - name: Configure CMake
        run: cmake -S cpp_engine -B build

      - name: Build C++ engine
        run: cmake --build build

      - name: Run C++ unit tests
        run: ./build/tradeguard_tests

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r python_analytics/requirements.txt
          pip3 install -r api/requirements.txt

      - name: Validate FastAPI files
        run: python3 -m py_compile api/main.py api/brokers/*.py

      - name: Generate sample market data
        run: python3 python_analytics/generate_sample_data.py

      - name: Run TradeGuard Engine
        run: ./build/tradeguard data/sample_ticks.csv output config/risk_config.json

      - name: Generate Python analytics report
        run: python3 python_analytics/report.py

      - name: Run strategy optimization
        run: python3 python_analytics/optimize_strategy.py

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm install

      - name: Build React TypeScript dashboard
        working-directory: dashboard
        run: npm run build
